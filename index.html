age type",coverTotal:"Total sky coverage",coverPartial:"Partial cloud coverage",coverWhat:"What covers the sky?",coverPct:"Coverage percentage",coverOpts:["Fog","Heavy rain","Heavy snow","Sand","Spray / Smoke","Dust","Volcanic ash"],partialOpts:[{v:"none",l:"None"},{v:"few",l:"Few (< 10%)"},{v:"isolated",l:"Isolated (10–25%)"},{v:"scattered",l:"Scattered (25–50%)"},{v:"broken",l:"Broken (50–90%)"},{v:"overcast",l:"Overcast (90–100%)"}],skyColor:"Sky colour",visibility:"Visibility",colorOpts:["Cannot observe","Deep blue","Blue","Light blue","Pale milky blue"],visibOpts:["Cannot observe","Exceptionally clear","Clear","Slightly hazy","Very hazy","Extremely hazy"],cloudDesc:"Select all genera you can identify.",noneLabel:"None",precip:"Precipitation",rain:"Rain",snow:"Snow",temp:"Temperature (°C)",humid:"Humidity (%)",tempPh:"E.g. 16",humPh:"E.g. 78",classifDesc:"Fill in the classification of clouds observed. Use the button to add more.",cloudN:n=>`Cloud ${n}`,addCloud:"+ Add cloud",removeCloud:"Remove",fTipo:"Type and abbreviation",tipoPh:"E.g. Cirrus — Ci",fNivel:"Level / Tier",nivelPh:"E.g. High / Superior",fDef:"Definition",defPh:"Visual appearance and characteristics",fConst:"Physical composition",constPh:"Composition (droplets, crystals...)",fForm:"Formation",formPh:"How and where it forms",notesL:"Additional notes",notesPh:"General observations...",refTitle:"Cloud identification references",coverL:"Coverage",skyColorL:"Sky colour",visibL:"Visibility",hiClouds:"High level",midClouds:"Mid level",loClouds:"Low level",precipL:"Precipitation",tempL:"Temperature",humL:"Humidity",classifL:"Classifications",notesLL:"Notes",noName:"No name",noPrec:"No",noneV:"None"}};

ir weather"},{code:"Cb",name:"Cumulonimbus",desc:"Large anvil top, thunderstorm and heavy rain"}]}]};

let S={lang:"pt",screen:"home",step:0,form:iF(),saving:false,profPass:"",profErr:"",subs:[],loading:false,expanded:null};
function ss(p){S=Object.assign({},S,p);render();}

// Comprime foto para caber numa célula do Google Sheets (~30KB)
function compressImg(file,cb){
  const r=new FileReader();
  r.onload=e=>{
    const i=new Image();
    i.onload=()=>{
      // Max 480px, qualidade 40% — produz ~15-30KB (cabe na Sheet)
      const MAX=480;
      let w=i.width,h=i.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const c=document.createElement("canvas");
      c.width=w;c.height=h;
      c.getContext("2d").drawImage(i,0,0,w,h);
      cb(c.toDataURL("image/jpeg",.40));
    };
    i.src=e.target.result;
  };
  r.readAsDataURL(file);
}

function rProf(){const tr=t();let body;if(S.loading){body=`<p class="muted" style="text-align:center;padding:3rem">${e(tr.loading)}</p>`;}else if(!S.subs.length){body=`<div class="card" style="text-align:center;padding:3rem"><p class="muted">${e(tr.noSubs)}</p></div>`;}else{body=S.subs.map((sub,i)=>{const all=[...(sub.nuvAlto||[]),...(sub.nuvMedio||[]),...(sub.nuvBaixo||[])];const open=S.expanded===i;const st2=TR[sub.lang||"pt"];const tags=all.map(c=>`<span class="tag">${e(c)}</span>`).join("");const thumb=sub.foto?`<img class="thumb" src="${sub.foto}" alt="">` :"";let bd="";if(open){const rows=[[st2.coverL,sub.cobOpcao==="total"?`Total: ${sub.cobTotal||""}`:sub.cobOpcao==="parcial"?`Parcial: ${sub.cobParcial||""}`:null],[st2.skyColorL,sub.cor],[st2.visibL,sub.visib],[st2.hiClouds,(sub.nuvAlto||[]).join(", ")||st2.noneV],[st2.midClouds,(sub.nuvMedio||[]).join(", ")||st2.noneV],[st2.loClouds,(sub.nuvBaixo||[]).join(", ")||st2.noneV],[st2.precipL,[sub.chuva&&st2.rain,sub.neve&&st2.snow].filter(Boolean).join(", ")||st2.noPrec],[st2.tempL,sub.temp?`${sub.temp} °C`:null],[st2.humL,sub.humidade?`${sub.humidade}%`:null],[st2.notesLL,sub.notas]].filter(r=>r[1]).map(([l,v])=>`<div class="dr"><span class="dl">${e(l)}</span><span class="dv">${e(v)}</span></div>`).join("");const vc=(sub.classif||[]).filter(c=>c.tipo);const ci=vc.length?`<div style="margin-top:.75rem"><div class="dr"><span class="dl">${e(st2.classifL)}</span></div>${vc.map(c=>`<div style="background:#f8f9fa;border-radius:8px;padding:.625rem;margin-bottom:.375rem;font-size:.8125rem"><div style="font-weight:600;color:#185FA5;margin-bottom:.25rem">${e(c.tipo)}${c.nivel?` — ${e(c.nivel)}`:""}</div>${c.def?`<div><b>Def.:</b> ${e(c.def)}</div>`:""}${c.composicao?`<div><b>Const.:</b> ${e(c.composicao)}</div>`:""}${c.formacao?`<div><b>Form.:</b> ${e(c.formacao)}</div>`:""}</div>`).join("")}</div>`:"";
// Foto: base64 guardada diretamente, sem dependência do Google Drive
const ph=sub.foto?`<div style="margin-bottom:.75rem"><img src="${sub.foto}" style="width:100%;max-height:220px;object-fit:cover;border-radius:8px;border:1px solid #e0e0e0" alt="Fotografia do céu"></div>`:"";
bd=`<div class="pcb">${ph}${rows}${ci}</div>`;}const meta=[sub.grupo&&`Grupo: ${sub.grupo}`,sub.local,sub.data].filter(Boolean).join(" · ");return`<div class="pc"><div class="pch" data-toggle="${i}"><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:.9375rem">${e(sub.nome||tr.noName)}</div><div class="tiny" style="margin-top:2px">${e(meta)}</div>${tags?`<div style="margin-top:.375rem">${tags}</div>`:""}</div><div style="display:flex;align-items:center;gap:.5rem;margin-left:.75rem;flex-shrink:0">${thumb}${chv(open)}</div></div>${bd}</div>`;}).join("");}return`<div class="pg-w"><div class="ph"><div><h2>${e(tr.profTitle)}</h2><p class="tiny">${e(tr.profCount(S.subs.length))}</p></div><div class="phb"><button class="phbt" id="btn-refresh">${e(tr.refresh)}</button><button class="phbt" id="btn-exit">${e(tr.exitBtn)}</button></div></div>${body}</div>`;}

function rS0(){const tr=t();return[["nome",tr.fName,"text"],["grupo",tr.fGroup,"text"],["local",tr.fLoc,"text"],["data",tr.fDate,"text"]].map(([k,ph])=>`<div class="fld">${fl(ph)}<input type="text" id="f-${k}" value="${e(S.form[k])}" placeholder="${e(k==="grupo"?tr.fGroupPh:ph)}"></div>`).join("");}
function rS1(){const tr=t();const ph=S.form.foto?`<img class="photo-prev" src="${S.form.foto}" alt="Céu"><button class="btn bs" id="btn-change-photo" style="margin-top:0">${e(tr.changePhoto)}</button>`:`<button class="btn bp" id="btn-take-photo" style="display:flex;align-items:center;justify-content:center;gap:.5rem"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>${e(tr.takePhoto)}</button>`;return`${st("A",tr.photoTitle)}<p class="muted" style="margin-bottom:1rem;font-size:.875rem">${e(tr.photoDesc)}</p><input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none">${ph}`;}
function rS2(){const tr=t();const f=S.form;let sub="";if(f.cobOpcao==="total"){sub=`<div style="margin-top:1rem">${fl(tr.coverWhat)}<div class="rd">${rg(tr.coverOpts,f.cobTotal,"cobTotal")}</div></div>`;}else if(f.cobOpcao==="parcial"){sub=`<div style="margin-top:1rem">${fl(tr.coverPct)}<div class="rd">${rg(tr.partialOpts.map(o=>({value:o.v,label:o.l})),f.cobParcial,"cobParcial")}</div></div>`;}return`${st("B",tr.coverType)}<div class="rd">${rg([{value:"total",label:tr.coverTotal},{value:"parcial",label:tr.coverPartial}],f.cobOpcao,"cobOpcao")}</div>${sub}`;}
function rS3(){const tr=t();const f=S.form;return`${st("C",t().steps[3])}${fl(tr.skyColor)}<div class="rd">${rg(tr.colorOpts,f.cor,"cor")}</div><div style="height:1rem"></div>${fl(tr.visibility)}<div class="rd">${rg(tr.visibOpts,f.visib,"visib")}</div>`;}
function rS4(){const tr=t();const f=S.form;return`${st("D",t().steps[4])}<p class="muted" style="margin-bottom:1rem;font-size:.875rem">${e(tr.cloudDesc)}</p>${lv().map(lev=>{const sk=`nuv${lev.key.charAt(0).toUpperCase()+lev.key.slice(1)}`;const sel=f[sk]||[];const chips=[`<button class="chip ${sel.length===0?"on":""}" data-cn="${sk}" style="--ac:${lev.ac}">${e(tr.noneLabel)}</button>`,...lev.types.map(tp=>`<button class="chip ${sel.includes(tp.code)?"on":""}" data-c="${sk}" data-code="${tp.code}" style="--ac:${lev.ac}">${e(tp.code)} — ${e(tp.name)}</button>`)].join("");const hints=sel.map(code=>{const tp=lev.types.find(x=>x.code===code);return tp?`<div class="hint" style="--ac:${lev.ac}"><b style="color:${lev.ac}">${e(tp.code)}:</b> ${e(tp.desc)}</div>`:""}).join("");return`<div style="margin-bottom:1.25rem"><div style="display:flex;align-items:baseline;gap:.375rem;margin-bottom:.5rem"><span style="font-size:.875rem;font-weight:600;color:${lev.ac}">${e(lev.label)}</span><span class="tiny">${e(lev.sub)}</span></div><div class="chips">${chips}</div>${hints}</div>`;}).join("")}`;}
function rS5(){const tr=t();const f=S.form;return`${st("E",t().steps[5])}${fl(tr.precip)}<div class="chk-g" style="margin-bottom:1rem"><div class="chk ${f.chuva?"on":""}" data-ck="chuva"><div class="cbox">${ck()}</div><span style="font-size:.875rem">${e(tr.rain)}</span></div><div class="chk ${f.neve?"on":""}" data-ck="neve"><div class="cbox">${ck()}</div><span style="font-size:.875rem">${e(tr.snow)}</span></div></div><div class="g2"><div class="fld">${fl(tr.temp)}<input type="number" id="f-temp" value="${e(S.form.temp)}" placeholder="${e(tr.tempPh)}"></div><div class="fld">${fl(tr.humid)}<input type="number" id="f-humidade" value="${e(S.form.humidade)}" placeholder="${e(tr.humPh)}"></div></div>`;}
function rS6(){const tr=t();const f=S.form;const blocks=f.classif.map((c,i)=>`<div class="cb"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem"><span style="font-size:.8125rem;font-weight:600;color:#185FA5">${e(tr.cloudN(i+1))}</span>${i>0?`<button class="rm" data-rc="${i}">${e(tr.removeCloud)}</button>`:""}</div>${[["tipo",tr.fTipo,tr.tipoPh,"i"],["nivel",tr.fNivel,tr.nivelPh,"i"],["def",tr.fDef,tr.defPh,"a"],["composicao",tr.fConst,tr.constPh,"a"],["formacao",tr.fForm,tr.formPh,"a"]].map(([k,lbl,ph,type])=>`<div style="margin-bottom:.625rem">${fl(lbl)}${type==="a"?`<textarea id="c-${i}-${k}" rows="2" placeholder="${e(ph)}">${e(c[k])}</textarea>`:`<input type="text" id="c-${i}-${k}" value="${e(c[k])}" placeholder="${e(ph)}">`}</div>`).join("")}</div>`).join("");const refs=REFS.map(r=>`<a href="${r.url}" target="_blank" rel="noopener noreferrer" class="ref-a"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>${e(r.label)}</a>`).join("");return`${st("F",t().steps[6])}<p class="muted" style="margin-bottom:1rem;font-size:.875rem">${e(tr.classifDesc)}</p>${blocks}<button class="btn bs" id="btn-add" style="margin-bottom:1.25rem">${e(tr.addCloud)}</button><div style="margin-bottom:1.25rem">${fl(tr.notesL)}<textarea id="f-notas" rows="3" placeholder="${e(tr.notesPh)}">${e(f.notas)}</textarea></div><div style="border-top:1px solid #e8eaed;padding-top:1rem">${fl(tr.refTitle)}${refs}</div>`;}

function rStudent(){const tr=t();const N=tr.steps.length;const pct=Math.round(((S.step+1)/N)*100);const fns=[rS0,rS1,rS2,rS3,rS4,rS5,rS6];const isLast=S.step===N-1;return`<div class="pg"><div class="sh"><button class="bk" id="btn-prev-step"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>${e(S.step===0?tr.homeBtn:tr.prevBtn)}</button><span class="tiny">${S.step+1} / ${N}</span></div><div class="prog"><div class="progf" style="width:${pct}%"></div></div><h2 style="margin-bottom:1rem">${e(tr.steps[S.step])}</h2><div class="card">${fns[S.step]()}</div></div><div class="bnav">${isLast?`<button class="btn bp" id="btn-submit" ${S.saving?"disabled style='opacity:.6'":""}>${S.saving?e(tr.savingBtn):e(tr.submitBtn)}</button>`:`<button class="btn bp" id="btn-next-step">${e(tr.nextBtn)}</button>`}</div>`;}

function render(){const m={home:rHome,profLogin:rProfLogin,done:rDone,prof:rProf,student:rStudent};document.getElementById("app").innerHTML=m[S.screen]();attachListeners();}

function saveInputs(){const g=id=>(document.getElementById(id)||{}).value||"";if(S.step===0){Object.assign(S.form,{nome:g("f-nome"),grupo:g("f-grupo"),local:g("f-local"),data:g("f-data")});}if(S.step===5){Object.assign(S.form,{temp:g("f-temp"),humidade:g("f-humidade")});}if(S.step===6){const notas=g("f-notas");const classif=S.form.classif.map((c,i)=>({tipo:g(`c-${i}-tipo`)||c.tipo,nivel:g(`c-${i}-nivel`)||c.nivel,def:g(`c-${i}-def`)||c.def,composicao:g(`c-${i}-composicao`)||c.composicao,formacao:g(`c-${i}-formacao`)||c.formacao}));Object.assign(S.form,{notas,classif});}}

async function submitForm(){ss({saving:true});try{await fetch(GAS_URL,{method:"POST",body:JSON.stringify({...S.form,ts:new Date().toISOString(),lang:S.lang})});ss({saving:false,screen:"done"});}catch(err){ss({saving:false});alert(t().saveErr);}}

async function loadSubs(){try{const r=await fetch(`${GAS_URL}?action=getData&code=${PROF_CODE}`);const d=await r.json();ss({subs:Array.isArray(d)?d:[],loading:false});}catch(err){ss({subs:[],loading:false});alert("Erro ao carregar.");}}

function attachListeners(){const $=id=>document.getElementById(id);const on=(id,ev,fn)=>{const el=$(id);if(el)el.addEventListener(ev,fn);};
document.querySelectorAll("[data-lang]").forEach(b=>b.addEventListener("click",()=>ss({lang:b.dataset.lang})));
on("btn-start","click",()=>ss({step:0,form:iF(),screen:"student"}));
on("btn-prof","click",()=>ss({screen:"profLogin",profPass:"",profErr:""}));
on("btn-back","click",()=>ss({screen:"home"}));
on("prof-pass","input",e=>{S.profPass=e.target.value;});
on("btn-enter","click",()=>{const p=($("prof-pass")||{}).value||"";if(p===PROF_CODE){ss({screen:"prof",subs:[],loading:true,expanded:null});loadSubs();}else ss({profErr:t().wrongCode,profPass:p});});
on("prof-pass","keydown",e=>{if(e.key==="Enter")($("btn-enter")||{click:()=>{}}).click();});
on("btn-refresh","click",()=>{ss({loading:true,subs:[]});loadSubs();});
on("btn-exit","click",()=>ss({screen:"home"}));
on("btn-new","click",()=>ss({step:0,form:iF(),screen:"student"}));
on("btn-home","click",()=>ss({screen:"home"}));
document.querySelectorAll("[data-toggle]").forEach(el=>el.addEventListener("click",()=>{const i=parseInt(el.dataset.toggle);ss({expanded:S.expanded===i?null:i});}));
on("btn-prev-step","click",()=>{saveInputs();if(S.step===0)ss({screen:"home"});else ss({step:S.step-1});});
on("btn-next-step","click",()=>{saveInputs();ss({step:S.step+1});});
on("btn-submit","click",()=>{saveInputs();submitForm();});
on("btn-take-photo","click",()=>($("photo-input")||{click:()=>{}}).click());
on("btn-change-photo","click",()=>($("photo-input")||{click:()=>{}}).click());
on("photo-input","change",ev=>{const f=ev.target.files[0];if(!f)return;compressImg(f,d=>sf("foto",d));});
document.querySelectorAll("[data-radio]").forEach(el=>el.addEventListener("click",()=>sf(el.dataset.radio,el.dataset.val)));
document.querySelectorAll("[data-cn]").forEach(b=>b.addEventListener("click",()=>sf(b.dataset.cn,[])));
document.querySelectorAll("[data-c]").forEach(b=>b.addEventListener("click",()=>{const k=b.dataset.c;const code=b.dataset.code;const cur=S.form[k]||[];sf(k,cur.includes(code)?cur.filter(x=>x!==code):[...cur,code]);}));
document.querySelectorAll("[data-ck]").forEach(el=>el.addEventListener("click",()=>sf(el.dataset.ck,!S.form[el.dataset.ck])));
on("btn-add","click",()=>{saveInputs();const f=Object.assign({},S.form,{classif:[...S.form.classif,{...EC}]});ss({form:f});});
document.querySelectorAll("[data-rc]").forEach(b=>b.addEventListener("click",()=>{saveInputs();const i=parseInt(b.dataset.rc);const f=Object.assign({},S.form,{classif:S.form.classif.filter((_,j)=>j!==i)});ss({form:f});}));
}

render();
</script>
</body>
</html>
